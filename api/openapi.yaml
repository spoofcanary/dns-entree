openapi: 3.1.0
info:
  title: dns-entree HTTP API
  version: 0.1.0-alpha
  description: |
    Stateless HTTP facade over the dns-entree library. Plan 06-04 fills the
    full operation set; this stub exists so the binary can serve a valid
    document from /v1/openapi.yaml during wave-1 development.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: process is up
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: ready to serve traffic
        "503":
          description: not ready
  /metrics:
    get:
      summary: Prometheus text exposition
      responses:
        "200":
          description: metrics
          content:
            text/plain:
              schema:
                type: string
