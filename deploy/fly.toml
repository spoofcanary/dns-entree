app = "dns-entree"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ENTREE_API_LISTEN = ":8080"
  ENTREE_API_LOG_FORMAT = "json"
  ENTREE_API_STATE_DIR = "/data/migrations"
  # Set ENTREE_STATE_KEY via `fly secrets set ENTREE_STATE_KEY=$(openssl rand -hex 32)`

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      interval = "10s"
      timeout = "2s"
      grace_period = "5s"
      method = "GET"
      path = "/healthz"

[mounts]
  source = "entree_state"
  destination = "/data"
