services:
  - type: web
    name: dns-entree
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: ENTREE_API_LISTEN
        value: ":8080"
      - key: ENTREE_API_LOG_FORMAT
        value: json
      - key: ENTREE_API_STATE_DIR
        value: /data/migrations
      - key: ENTREE_STATE_KEY
        generateValue: true
    disk:
      name: entree-state
      mountPath: /data
      sizeGB: 1
